<!DOCTYPE html>
<html lang="en" class="h-full bg-[#0B0F19]">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ApexEduNexus — Academic Command Console</title>
    
    <!-- Google Fonts: Modern Interface Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#eff6ff',
                100: '#dbeafe',
                500: '#3b82f6',
                600: '#2563eb',
                700: '#1d4ed8',
                950: '#0b0f19',
              }
            }
          }
        }
      }
    </script>

    <!-- Custom Micro-interactions & Glassmorphism Overrides -->
    <style>
      /* Smooth global transitions */
      * {
        transition-property: background-color, border-color, text-color, fill, stroke;
        transition-duration: 150ms;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Custom scrollbar matching dark interface */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0b0f19;
      }
      ::-webkit-scrollbar-thumb {
        background: #1e293b;
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #334155;
      }

      /* Premium radial glow for background depth */
      .radial-glow {
        background: radial-gradient(circle at 50% 0%, rgba(37, 99, 235, 0.12) 0%, rgba(15, 23, 42, 0) 50%);
      }

      /* Webkit-backdrop filter fallbacks */
      .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
    </style>
  </head>
  <body class="h-full text-slate-200 antialiased font-sans radial-glow selection:bg-blue-500/30 selection:text-blue-200">
    <!-- Root Mounting Point -->
    <div id="root" class="min-h-screen flex flex-col"></div>
    
    <!-- React Entry Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
