<!DOCTYPE html>
<html lang="en" class="h-full bg-gray-50">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>ApexEduNexus — Academic Command Console</title>
    
    <!-- Google Fonts: Modern Interface Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              display: ['Plus Jakarta Sans', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#faf5ff',
                100: '#f3e8ff',
                500: '#a855f7',
                600: '#7c3aed',
                700: '#6d28d9',
                950: '#2e1065',
              }
            }
          }
        }
      }
    </script>

    <!-- Custom Micro-interactions -->
    <style>
      /* Smooth global transitions */
      * {
        transition-property: background-color, border-color, text-color, fill, stroke;
        transition-duration: 150ms;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
      }

      /* Custom scrollbar matching light interface */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #f9fafb;
      }
      ::-webkit-scrollbar-thumb {
        background: #d1d5db;
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #9ca3af;
      }

      /* Card surface helper */
      .glass-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(17, 24, 39, 0.06);
      }

      /* Flashcard flip */
      .flashcard-perspective {
        perspective: 1200px;
        height: 220px;
        cursor: pointer;
      }
      .flashcard-inner {
        position: relative;
        width: 100%;
        height: 100%;
        transition: transform 0.5s;
        transform-style: preserve-3d;
      }
      .flashcard-inner.is-flipped {
        transform: rotateY(180deg);
      }
      .flashcard-front, .flashcard-back {
        position: absolute;
        width: 100%;
        height: 100%;
        backface-visibility: hidden;
        -webkit-backface-visibility: hidden;
      }
      .flashcard-back {
        transform: rotateY(180deg);
      }

      /* Fade-in */
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.25s ease-out;
      }
    </style>
  </head>
  <body class="h-full text-gray-800 antialiased font-sans bg-gray-50 selection:bg-purple-200 selection:text-purple-900">
    <!-- Root Mounting Point -->
    <div id="root" class="min-h-screen flex flex-col"></div>
    
    <!-- React Entry Script -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
